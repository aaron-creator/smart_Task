name: Backend CI - Spring Boot Maven

on:
  push:
    branches: [ "main" ]
    paths:
      - "taskmanagement-backend/**"
      - ".github/workflows/backend-ci.yml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "taskmanagement-backend/**"
      - ".github/workflows/backend-ci.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Spring Boot Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show project structure
        run: |
          pwd
          ls -la
          ls -la taskmanagement-backend

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: taskmanagement-backend/pom.xml

      - name: Build backend with Maven
        run: mvn -B -f taskmanagement-backend/pom.xml clean verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: taskmanagement-backend/target/*.jar
